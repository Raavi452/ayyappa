<!DOCTYPE HTML>
<HTML>
	<HEAD>
		<TITLE>JavaScript Animation</TITLE>
		<SCRIPT type="text/javascript">
			var imgObj = null;
			var animate;
function init(){
	imgObj = document.getElementById('myImage');
	imgObj.style.position= 'relative'; 
	imgObj.style.left = '0px'; 
			}
function moveRight(){
imgObj.style.left = parseInt(imgObj.style.left) + 10 + 'px';
	animate = setTimeout(moveRight,100); // call moveRight in 20msec
	}
function stop()
{
   clearTimeout(animate);
   imgObj.style.left = '0px'; 
	}
</SCRIPT>
	</HEAD>
	<BODY onload="init()" bgcolor="#F2279A">
	
	<IMG id="myImage" src="car.gif" height="100px" width="100px"/>
	<P>Click the Start button to start aniamtion</P>
	<button onclick="moveRight();">Start</button>
	<button onclick="stop();">Stop</button>
		</BODY>
</HTML>
